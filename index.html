<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EYEDIT GROUP</title>

<style>
  body {
    margin: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 360px;
    height: 360px;
  }

  /* TRIANGLE ROTATION */
  .triangle {
    position: absolute;
    width: 100%;
    height: 100%;
    animation: spin 20s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(-360deg); }
  }

  /* LINES */
  .line {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 140px;
    height: 2px;
    background: #00ffc3;
    transform-origin: left;
  }

  .l1 { transform: rotate(0deg); }
  .l2 { transform: rotate(120deg); }
  .l3 { transform: rotate(240deg); }

  /* NODES */
  .node {
    position: absolute;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    overflow: hidden;
  }

  .node img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* POSITIONS */
  .top { top: 0; left: 130px; }
  .left { bottom: 0; left: 0; }
  .right { bottom: 0; right: 0; }

  /* CENTER LOGO */
  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 120px;
    height: 120px;
    transform: translate(-50%, -50%);
  }

  .center img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

</style>
</head>

<body>

<div class="scene">

  <div class="triangle">
    <div class="line l1"></div>
    <div class="line l2"></div>
    <div class="line l3"></div>

    <div class="node left">
      <img src="logo-ccs-canssam.png" />
    </div>

    <div class="node right">
      <img src="logo-eye-vision.png" />
    </div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <img src="logo-triangle-obturador.png" />
  </div>

</div>

</body>
</html>
