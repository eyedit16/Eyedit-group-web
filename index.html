<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eyedit Group</title>
<style>body{ margin:0; font-family:Arial,Helvetica,sans-serif; background:#05070b; color:white; }

section{ padding:80px 20px; max-width:1200px; margin:auto; }

h2{ text-transform:uppercase; letter-spacing:2px; }

/* ---------- TRIANGLE AREA ---------- */

.portal{ height:90vh; display:flex; align-items:center; justify-content:center; }

.triangle-system{ position:relative; width:720px; height:720px; }

.triangle-rotator{ position:absolute; inset:0; animation:spin 40s linear infinite; }

@keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(-360deg);} /* counter clockwise */ }

.triangle-svg{ position:absolute; width:100%; height:100%; }

.node{ position:absolute; width:340px; display:flex; flex-direction:column; align-items:center; text-align:center; }

.top{left:50%;top:-10px;transform:translateX(-50%);} .left{left:-40px;bottom:-10px;} .right{right:-40px;bottom:-10px;}

/* BIG LOGOS SAME SIZE AS GLOW CIRCLE */

.logo-shell{ width:320px; height:320px; border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle,rgba(255,255,255,0.15),rgba(255,255,255,0.02)); }

.logo-shell img{ width:100%; height:100%; object-fit:cover; }

/* ---------- STRUCTURE ---------- */

.structure-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:40px; }

.card{ background:#0c121a; padding:30px; border-radius:20px; text-align:center; }

.division-logo{ width:260px; height:260px; margin:auto; margin-bottom:20px; border-radius:50%; overflow:hidden; background:radial-gradient(circle,rgba(255,255,255,0.15),rgba(255,255,255,0.02)); }

.division-logo img{ width:100%; height:100%; object-fit:contain; }

/* ---------- PORTFOLIO ---------- */

.portfolios{ display:grid; grid-template-columns:repeat(3,1fr); gap:40px; }

.gallery{ display:grid; grid-template-columns:repeat(3,1fr); gap:15px; margin-top:20px; }

.gallery img{ width:100%; height:280px; object-fit:cover; border-radius:16px; }

/* ---------- RESPONSIVE ---------- */

@media(max-width:1000px){

.triangle-system{ width:500px; height:500px; }

.logo-shell{ width:180px; height:180px; }

.structure-row, .portfolios{ grid-template-columns:1fr; }

.gallery{ grid-template-columns:1fr; }

}

</style>
</head>
<body><section class="portal"><div class="triangle-system"><div class="triangle-rotator"><svg class="triangle-svg" viewBox="0 0 560 560">
<polygon points="280,82 116,390 444,390" fill="none" stroke="#7fffd4" stroke-width="3"/>
</svg><div class="node top">
<div class="logo-shell">
<img src="logo-eye-vision.png">
</div>
</div><div class="node left">
<div class="logo-shell">
<img src="logo-ccs-canssam.png">
</div>
</div><div class="node right">
<div class="logo-shell">
<img src="logo-eye-dit.png">
</div>
</div></div>
</div></section><section>
<h2>Structure</h2><div class="structure-row"><div class="card">
<div class="division-logo"><img src="logo-eye-vision.png"></div>
<h3>EyeVision</h3>
<p>Security · transport · telecom</p>
</div><div class="card">
<div class="division-logo"><img src="logo-ccs-canssam.png"></div>
<h3>CCS Canssam</h3>
<p>Natural therapies · wellness</p>
</div><div class="card">
<div class="division-logo"><img src="logo-eye-dit.png"></div>
<h3>EyeDit</h3>
<p>Image quick service · media</p>
</div></div>
</section><section>
<h2>Portfolios</h2><div class="portfolios"><div class="card">
<div class="division-logo"><img src="logo-eye-dit.png"></div>
<div class="gallery">
<img src="eyedit-1.png">
<img src="eyedit-2.png">
<img src="eyedit-3.png">
</div>
</div><div class="card">
<div class="division-logo"><img src="logo-ccs-canssam.png"></div>
<div class="gallery">
<img src="ccs-1.png">
<img src="ccs-2.png">
<img src="ccs-3.png">
</div>
</div><div class="card">
<div class="division-logo"><img src="logo-eye-vision.png"></div>
<div class="gallery">
<img src="eyevision-1.png">
<img src="eyevision-2.png">
<img src="eyevision-3.png">
</div>
</div></div>
</section></body>
</html>
