<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EyeDit Group Rotatiu</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-wrap {
      width: min(88vw, 700px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rotating-logo {
      width: 100%;
      height: auto;
      display: block;
      animation: spin 22s linear infinite;
      transform-origin: center center;
      filter: drop-shadow(0 0 20px rgba(0, 255, 180, 0.25));
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img
      src="logo-triangle-obturador.png"
      alt="Logo rotatiu EyeDit Group"
      class="rotating-logo"
    />
  </div>
</body>
</html>
