<!DOCTYPE html><html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EyeDit Group</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }:root {
  --bg: #02060d;
  --cyan: #2ed3ff;
  --green: #53ff8a;
  --gold: #ffb347;
  --text: #eaf6ff;
  --soft: rgba(255,255,255,0.08);
}

body {
  min-height: 100vh;
  font-family: Arial, Helvetica, sans-serif;
  background:
    radial-gradient(circle at 50% 35%, rgba(45,211,255,0.08), transparent 28%),
    radial-gradient(circle at 25% 70%, rgba(83,255,138,0.08), transparent 20%),
    radial-gradient(circle at 75% 70%, rgba(255,179,71,0.08), transparent 20%),
    #02060d;
  color: var(--text);
  overflow-x: hidden;
}

.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
}

.stage {
  position: relative;
  width: min(92vw, 980px);
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.triangle-wrap {
  position: relative;
  width: min(88vw, 760px);
  aspect-ratio: 1 / 1;
  animation: spin 26s linear infinite;
  transform-origin: center center;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(-360deg); }
}

.triangle-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 12px rgba(83,255,138,0.35));
  pointer-events: none;
}

.center-core {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 31%;
  transform: translate(-50%, -50%);
  z-index: 3;
  pointer-events: none;
  filter: drop-shadow(0 0 18px rgba(83,255,138,0.20));
}

.node {
  position: absolute;
  width: 27%;
  aspect-ratio: 1 / 1;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  transition: transform 0.25s ease, filter 0.25s ease;
  z-index: 4;
}

.node:hover {
  transform: scale(1.06);
  filter: brightness(1.12);
}

.node img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 50%;
  display: block;
  animation: counterSpin 26s linear infinite;
  box-shadow: 0 0 22px rgba(255,255,255,0.10);
  background: transparent;
}

@keyframes counterSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.top { top: 1%; left: 50%; transform: translateX(-50%); }
.left { left: 3%; bottom: 10%; }
.right { right: 3%; bottom: 10%; }

.node.top:hover { transform: translateX(-50%) scale(1.06); }

.caption {
  position: absolute;
  bottom: -44px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(234,246,255,0.78);
  white-space: nowrap;
  text-shadow: 0 0 10px rgba(255,255,255,0.15);
}

.instructions {
  position: absolute;
  left: 50%;
  bottom: 24px;
  transform: translateX(-50%);
  padding: 10px 16px;
  border: 1px solid var(--soft);
  border-radius: 999px;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(8px);
  font-size: 12px;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  color: rgba(234,246,255,0.8);
}

.brand {
  position: absolute;
  top: 28px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 10;
}

.brand h1 {
  font-size: clamp(24px, 4vw, 48px);
  letter-spacing: 4px;
  margin-bottom: 8px;
}

.brand p {
  font-size: clamp(11px, 1.5vw, 14px);
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(234,246,255,0.72);
}

@media (max-width: 768px) {
  .triangle-wrap { width: min(94vw, 640px); }
  .center-core { width: 32%; }
  .node { width: 30%; }
  .top { top: 3%; }
  .left, .right { bottom: 12%; }
  .caption { font-size: 10px; bottom: -34px; }
  .instructions { font-size: 10px; bottom: 16px; }
}

@media (max-width: 480px) {
  .brand { top: 18px; }
  .triangle-wrap { width: 96vw; }
  .center-core { width: 34%; }
  .node { width: 31%; }
  .left { left: 1%; bottom: 14%; }
  .right { right: 1%; bottom: 14%; }
  .top { top: 6%; }
  .caption { display: none; }
}

  </style>
</head>
<body>
  <section class="hero">
    <div class="brand">
      <h1>EYEDIT GROUP</h1>
      <p>Holding creatiu, audiovisual i seguretat</p>
    </div><div class="stage">
  <div class="triangle-wrap">
    <svg class="triangle-svg" viewBox="0 0 100 100" aria-hidden="true">
      <defs>
        <linearGradient id="lineA" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#53ff8a" />
          <stop offset="100%" stop-color="#2ed3ff" />
        </linearGradient>
      </defs>
      <polygon
        points="50,12 17,74 83,74"
        fill="none"
        stroke="url(#lineA)"
        stroke-width="0.9"
        stroke-linejoin="round"
        opacity="0.95"
      />
    </svg>

    <img class="center-core" src="logo-triangle-obturador.png" alt="Nucli EyeDit Group" />

    <a class="node top" href="#eyedit-audiovisual" aria-label="Entrar a EyeDit Audiovisual">
      <img src="eyedit-1.png" alt="EyeDit Audiovisual" />
      <span class="caption">EyeDit Audiovisual</span>
    </a>

    <a class="node left" href="#ccs-canssam" aria-label="Entrar a CCS CanSSam">
      <img src="ccs-1.png" alt="CCS CanSSam" />
      <span class="caption">CCS CanSSam</span>
    </a>

    <a class="node right" href="#eyevision-security" aria-label="Entrar a Eye Vision Security">
      <img src="eyevision-1.png" alt="Eye Vision Security" />
      <span class="caption">Eye Vision Security</span>
    </a>
  </div>
</div>

<div class="instructions">Clica un logo per entrar al projecte</div>

  </section>  <section id="eyedit-audiovisual"></section>
  <section id="ccs-canssam"></section>
  <section id="eyevision-security"></section>
  <!-- Eyedit Group website restored and updated -->
</body>
</html>
