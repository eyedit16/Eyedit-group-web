<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EYEDIT GROUP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #020713;
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    h1 {
      margin: 30px 0 10px;
      font-size: clamp(2rem, 6vw, 4rem);
    }

    .subtitle {
      max-width: 800px;
      margin: 0 auto 30px;
      padding: 0 20px;
      color: rgba(255,255,255,0.8);
      line-height: 1.6;
    }

    .scene {
      position: relative;
      width: min(92vw, 600px);
      height: min(92vw, 600px);
      margin: 20px auto 40px;
    }

    .triangle-rotator {
      position: absolute;
      inset: 0;
      animation: spin 30s linear infinite;
    }

    .triangle-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    .logo {
      position: absolute;
      width: 110px;
      height: 110px;
      z-index: 10;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .top {
      top: 6%;
      left: 50%;
      transform: translateX(-50%);
    }

    .left {
      bottom: 8%;
      left: 6%;
    }

    .right {
      bottom: 8%;
      right: 6%;
    }

    @media (max-width: 700px) {
      .logo {
        width: 85px;
        height: 85px;
      }
    }
  </style>
</head>
<body>

  <h1>EYEDIT GROUP</h1>
  <p class="subtitle">
    Global visual communication, natural wellness and strategic security.
  </p>

  <div class="scene">
    <div class="triangle-rotator">
      <img src="triangle-eyedit.png" alt="Triangle" class="triangle-img">
    </div>

    <div class="logo top">
      <img src="Logo-eye-dit.png" alt="EyeDit">
    </div>

    <div class="logo left">
      <img src="logo-ccs-canssam.png" alt="CCS CANSSAM">
    </div>

    <div class="logo right">
      <img src="logo-eyevision.png" alt="EyeVision">
    </div>
  </div>

</body>
</html>
